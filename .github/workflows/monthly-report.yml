# 월간 투자 리포트 자동 발송
# 
# 주요 실행 방식: Vercel Cron (vercel.json에 등록됨)
# - 매월 1일 UTC 00:00 (KST 09:00) 자동 실행
# - /api/cron/monthly-report GET 호출
# - Vercel 내부 크론이므로 배포 보호(Authentication) 자동 우회
#
# 이 GitHub Actions는 백업용으로 유지합니다.
# Vercel Cron이 실패할 경우 수동으로 실행할 수 있습니다.

name: Monthly Investment Report (Backup)

on:
  # 수동 실행만 지원 (Vercel Cron이 메인)
  workflow_dispatch:

jobs:
  send-monthly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📊 월간 리포트 수동 트리거
        run: |
          echo "📊 월간 투자 리포트 수동 트리거"
          echo "실행 시각: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')"
          echo ""
          echo "ℹ️ 메인 실행 방식: Vercel Cron (매월 1일 자동)"
          echo "ℹ️ 이 워크플로우는 백업용입니다."
          echo ""
          echo "✅ Vercel Cron이 매월 1일 KST 09:00에 자동으로 실행합니다."
          echo "✅ Vercel Dashboard → Cron Jobs에서 실행 기록을 확인하세요."
